services:
  - type: web
    name: hotel-aditya-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /data/hotel_aditya.db
      - key: OPENWEATHER_API_KEY
        sync: false        # Set real value in Render dashboard → Environment
      - key: GEMINI_API_KEY
        sync: false        # Set real value in Render dashboard → Environment
    disk:
      name: hotel-data
      mountPath: /data
      sizeGB: 1
